<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- ==========================================
         BRANDING & THEME
    =========================================== -->
    <title>Smart Stitch Enterprises | Premium Industrial Embroidery Machines</title>
    <!-- Changes the mobile browser top bar color to your Primary Blue -->
    <meta name="theme-color" content="#0d1b3e" /> 
    
    <!-- Make sure to place your actual favicon files in your /public folder -->
    <link rel="icon" type="image/png" href="./src/assets/images/logo.png" />
    
    <!-- ==========================================
         SEO META TAGS
    =========================================== -->
    <meta name="description" content="India's leading marketplace for commercial and industrial embroidery machines. Providing high-quality computerized solutions for your textile business." />
    <meta name="keywords" content="embroidery machines, industrial embroidery, computerized embroidery, Smart Stitch Enterprises, multi head embroidery machine, single head embroidery machine, textile machinery India" />
    <meta name="author" content="Smart Stitch Enterprises" />

    <!-- ==========================================
         OPEN GRAPH / WHATSAPP / FACEBOOK SHARING
    =========================================== -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Smart Stitch Enterprises - Premium Industrial Solutions" />
    <meta property="og:description" content="India's leading marketplace for commercial and industrial embroidery machines." />
    <meta property="og:site_name" content="Smart Stitch Enterprises" />
    <!-- Replace this URL with your actual website domain once hosted -->
    <meta property="og:url" content="https://www.yourdomain.com/" />
    <!-- Place an image named og-image.jpg (1200x630px) in your /public folder for social previews -->
    <meta property="og:image" content="/og-image.jpg" />

    <!-- ==========================================
         PERFORMANCE (PRECONNECT FONTS)
    =========================================== -->
    <!-- Preconnecting Google Fonts makes them load significantly faster -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  </head>
  <body>
    <!-- Fallback for users with JavaScript disabled -->
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
